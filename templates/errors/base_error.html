<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block error_title %}Error{% endblock %} | InfinityCard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0A0A0A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #6366F1, #4F46E5, #34D399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
        }
        .error-code._500 { background: linear-gradient(135deg, #F87171, #DC2626, #FB923C); -webkit-background-clip: text; background-clip: text; }
        .error-code._403 { background: linear-gradient(135deg, #FBBF24, #D97706, #F87171); -webkit-background-clip: text; background-clip: text; }
        .error-title {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .error-message {
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .error-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366F1, #4F46E5);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(99,102,241,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(165,180,252,0.4);
        }
        @media (max-width: 480px) {
            .error-code { font-size: 80px; }
            .error-title { font-size: 24px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="error-container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
